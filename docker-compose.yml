version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml  (Part 3 – full stack)
#
# Services:
#   mongodb       – primary database (port 27017)
#   redis         – BullMQ queue + pub/sub (port 6379)
#   ml-service    – Python Flask + Isolation Forest (port 5000)
#   redis-commander – BullBoard alternative GUI (port 8081)
#
# The NestJS app itself runs outside Docker in dev (npm run start:dev).
# For a fully containerised setup run:  docker compose --profile full up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  mongodb:
    image: mongo:7.0
    container_name: upi_fraud_mongo
    restart: unless-stopped
    ports:
      - '27018:27017'
    environment:
      MONGO_INITDB_DATABASE: upi_fraud_detection
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: upi_fraud_redis
    restart: unless-stopped
    ports:
      - '6378:6379'
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  ml-service:
    build:
      context: ./src/modules/ml
      dockerfile: Dockerfile
    container_name: upi_fraud_ml
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      FLASK_DEBUG: 'false'
      FRAUD_RISK_THRESHOLD: 70
      MEDIUM_RISK_THRESHOLD: 40
      MODEL_PATH: /app/models/model.joblib
      SCALER_PATH: /app/models/scaler.joblib
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ['CMD', 'python', '-c',
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3
    depends_on:
      mongodb:
        condition: service_healthy

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: upi_fraud_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: 'local:redis:6379'
    ports:
      - '8081:8081'
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
  ml_models:
